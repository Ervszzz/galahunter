services:
  - type: web
    name: galahunter-backend
    env: node
    buildCommand: cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: TRAVELPAYOUTS_TOKEN
        sync: false
      - key: TRAVELPAYOUTS_MARKER
        sync: false
      - key: FRONTEND_URL
        sync: false
